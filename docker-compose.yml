version: '3.8'

services:
  mongo:
    image: mongo:6
    container_name: yaarlink_mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: yaarlink
    networks:
      - yaarlink_net

  redis:
    image: redis:7-alpine
    container_name: yaarlink_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - yaarlink_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: yaarlink_backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGODB_URI=mongodb://mongo:27017/yaarlink
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET:-yaarlink_secret_change_me}
      - REFRESH_TOKEN_SECRET=${REFRESH_TOKEN_SECRET:-yaarlink_refresh_change_me}
      - CLIENT_URL=${CLIENT_URL:-http://localhost:3000}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME:-}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY:-}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET:-}
    depends_on:
      - mongo
      - redis
    volumes:
      - ./backend/uploads:/app/uploads
    networks:
      - yaarlink_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: yaarlink_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - yaarlink_net

volumes:
  mongo_data:

networks:
  yaarlink_net:
    driver: bridge
